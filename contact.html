<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get in Touch | Ben Athem</title>
<link rel="stylesheet" href="styles.css">

<style>
.contact{
max-width:800px;
margin:120px auto;
padding:0 30px;
}

.form-success,
.form-error {
  display: none;
  margin-bottom: 30px;
  padding: 18px 20px;
  border-radius: 8px;
}

.form-success:not(:empty) {
  display: block;
  background: #e2ece7;
  border: 1px solid #9fb5a9;
}

.form-error:not(:empty) {
  display: block;
  background: #f5e3e3;
  border: 1px solid #c89f9f;
}

[data-fs-error] {
  display: block;
  margin-top: 6px;
  font-size: 0.9rem;
}
  
.contact h1{
font-size:3.5rem;
margin-bottom:20px;
}

.contact p{
font-size:1.1rem;
line-height:1.8;
margin-bottom:40px;
}

label{
display:block;
margin:25px 0 8px;
font-weight:600;
}

input,
textarea{
width:100%;
padding:16px;
font-size:1rem;
border:1px solid #ccc;
border-radius:8px;
font-family:inherit;
box-sizing:border-box;
}

textarea{
min-height:220px;
resize:vertical;
}

button{
margin-top:30px;
padding:16px 34px;
border:none;
background:#1f2b28;
color:white;
font-size:1rem;
border-radius:8px;
cursor:pointer;
transition:.2s;
}

button:hover{
opacity:.9;
}
</style>

</head>

<body>

<header class="site-header">

<a class="brand" href="index.html">Ben Athem</a>

<nav>
<a href="index.html">Home</a>
<a href="stories.html">Stories</a>
<a href="about.html">About</a>
</nav>

</header>

<section class="contact">

<h1>Get in Touch</h1>

<p>
Whether you have a question about my books, would like to discuss translation or rights opportunities, or simply want to say hello, I'd love to hear from you.
</p>

<div class="form-success" data-fs-success></div>
<div class="form-error" data-fs-error></div>

<form id="contact-form">

  <label for="name">Name</label>
  <input
    id="name"
    type="text"
    name="name"
    data-fs-field
    required
  >
  <span data-fs-error="name"></span>

  <label for="email">Email</label>
  <input
    id="email"
    type="email"
    name="email"
    data-fs-field
    required
  >
  <span data-fs-error="email"></span>

  <label for="subject">Subject</label>
  <input
    id="subject"
    type="text"
    name="subject"
    data-fs-field
  >
  <span data-fs-error="subject"></span>

  <label for="message">Message</label>
  <textarea
    id="message"
    name="message"
    data-fs-field
    required
  ></textarea>
  <span data-fs-error="message"></span>

  <button type="submit" data-fs-submit-btn>
    Send Message
  </button>

</form>

<script>
  window.formspree = window.formspree || function () {
    (formspree.q = formspree.q || []).push(arguments);
  };

  formspree('initForm', {
    formElement: '#contact-form',
    formId: 'xwvgeenr'
  });
</script>

<script
  src="https://unpkg.com/@formspree/ajax@1"
  defer>
</script>

</section>

</body>

</html>
